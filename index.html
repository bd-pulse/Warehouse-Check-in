<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Check-In</title>
<style>
:root{--navy:#1F3864;--blue:#2E75B6;--green:#1e7e34;--green-light:#d4edda;--red:#c0392b;--red-light:#fdecea;--bg:#f0f4f8;--card:#fff;--text:#1a202c;--muted:#718096;--border:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
.header{width:100%;max-width:460px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.logo{width:44px;height:44px;background:var(--navy);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card{background:var(--card);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:28px 24px;width:100%;max-width:460px;margin-bottom:16px}
.badge{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:24px}
.badge-icon{width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:7px}
input,textarea{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;color:var(--text);outline:none;background:#fafbfc}
input:focus,textarea:focus{border-color:var(--blue);background:#fff}
textarea{resize:none;min-height:70px}
.field{margin-bottom:20px}
.timebox{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:15px;display:flex;align-items:center;gap:8px}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#fff;background:linear-gradient(135deg,var(--navy),var(--blue))}
.btn:disabled{opacity:.5;cursor:not-allowed}
.toast{display:none;border-radius:12px;padding:15px 20px;font-weight:600;align-items:center;gap:12px;width:100%;max-width:460px;margin-bottom:12px}
.toast.ok{display:flex;background:var(--green-light);color:var(--green);border:1.5px solid #a8d5b5}
.toast.err{display:flex;background:var(--red-light);color:var(--red);border:1.5px solid #f5b7b1}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
.spin{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="3" width="7" height="7" rx="1" fill="white"/>
      <rect x="14" y="3" width="7" height="7" rx="1" fill="white"/>
      <rect x="3" y="14" width="7" height="7" rx="1" fill="white"/>
      <rect x="15.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/>
    </svg>
  </div>
  <div>
    <div style="font-size:20px;font-weight:700;color:var(--navy)">Warehouse Check-In</div>
    <div style="font-size:12px;color:var(--muted)">Tap &middot; Scan &middot; Log</div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="t-icon" style="font-size:22px"></span>
  <div><div id="t-title" style="font-size:15px;font-weight:700"></div><div id="t-sub" style="font-size:13px;opacity:.85;margin-top:2px"></div></div>
</div>

<div id="form" style="width:100%;max-width:460px">
  <div class="card">
    <div class="badge">
      <div class="badge-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="white"/></svg>
      </div>
      <div>
        <div id="loc-name" style="font-size:17px;font-weight:700">Loading...</div>
        <div id="loc-id" style="font-size:12px;opacity:.75;margin-top:2px">-</div>
      </div>
    </div>

    <div class="field">
      <label>&#128100; Your Name</label>
      <input type="text" id="name" placeholder="Enter your full name" autocomplete="off">
    </div>
    <div class="field">
      <label>&#128336; Scan Time</label>
      <div class="timebox">&#128336; <span id="clock">-</span></div>
    </div>
    <div class="field">
      <label>&#128221; Notes <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <textarea id="notes" placeholder="Any issues or observations..."></textarea>
    </div>
    <button class="btn" id="btn" onclick="submitScan()">&#10003; Log Inspection</button>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
var AIRTABLE_TOKEN  = "patrpR1gbgBCOHLtW.e05299f599a6f95ff358d933bd49987b15ad00ad51a34d0ffcc65606e60be4c9";
var AIRTABLE_BASE   = "appi3mEtuKJskiZvg";
var AIRTABLE_TABLE  = "tblduhNTobn2uBEKb";

function getParam(k) {
  return new URLSearchParams(window.location.search).get(k) || "";
}

function showToast(type, title, sub) {
  var t = document.getElementById("toast");
  t.className = "toast " + type;
  document.getElementById("t-icon").textContent  = type === "ok" ? "\u2705" : "\u274C";
  document.getElementById("t-title").textContent = title;
  document.getElementById("t-sub").textContent   = sub || "";
  clearTimeout(window._tt);
  window._tt = setTimeout(function() { t.className = "toast"; }, 5000);
}

function init() {
  var locId   = getParam("loc")  || "UNKNOWN";
  var locName = getParam("name") ? decodeURIComponent(getParam("name")) : locId;
  document.getElementById("loc-name").textContent = locName;
  document.getElementById("loc-id").textContent   = "ID: " + locId;
  var saved = localStorage.getItem("wh_name");
  if (saved) {
    document.getElementById("name").value = saved;
    document.getElementById("hint").textContent = "Name saved from your last scan";
  }
  setInterval(function() {
    var n = new Date();
    document.getElementById("clock").textContent =
      n.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}) +
      "  " + n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }, 1000);
}

async function submitScan() {
  var name = document.getElementById("name").value.trim();
  if (!name) { showToast("err","Name required","Please enter your name."); return; }

  var btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerHTML = "<div class='spin'></div> Saving...";

  try {
    var locId   = getParam("loc")  || "UNKNOWN";
    var locName = getParam("name") ? decodeURIComponent(getParam("name")) : locId;
    var now     = new Date();
    var ts      = now.toISOString().replace("T"," ").substring(0,19);
    var date    = now.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
    var time    = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    var notes   = document.getElementById("notes").value.trim();

    var res = await fetch("https://api.airtable.com/v0/" + AIRTABLE_BASE + "/" + AIRTABLE_TABLE, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + AIRTABLE_TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fields: {
          "Timestamp":     ts,
          "Date":          date,
          "Time":          time,
          "Worker Name":   name,
          "Location":      locName,
          "Location ID":   locId,
          "Notes":         notes
        }
      })
    });

    var data = await res.json();
    if (data.error) { throw new Error(data.error.message); }

    localStorage.setItem("wh_name", name);
    document.getElementById("notes").value = "";
    document.getElementById("hint").textContent = "Name saved for next scan";
    showToast("ok","Inspection logged!", locName + " - " + time);
  } catch(e) {
    console.error(e);
    showToast("err","Failed to save", e.message);
  }

  btn.disabled = false;
  btn.innerHTML = "&#10003; Log Inspection";
}

window.addEventListener("load", init);
</script>
</body>
</html>
