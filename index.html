<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Warehouse Check-In</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.11.0/lib/msal-browser.min.js"></script>
<style>
  :root {
    --navy: #1F3864; --blue: #2E75B6; --green: #1e7e34;
    --green-light: #d4edda; --red: #c0392b; --red-light: #fdecea;
    --bg: #f0f4f8; --card: #ffffff; --text: #1a202c;
    --muted: #718096; --border: #e2e8f0; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
  .app-header { width: 100%; max-width: 460px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .app-logo { width: 44px; height: 44px; background: var(--navy); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .app-title { font-size: 20px; font-weight: 700; color: var(--navy); }
  .app-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 28px 24px; width: 100%; max-width: 460px; margin-bottom: 16px; }
  .location-badge { background: linear-gradient(135deg, var(--navy), var(--blue)); color: white; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .loc-name { font-size: 17px; font-weight: 700; }
  .loc-id { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 7px; }
  input[type="text"] { width: 100%; padding: 13px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; color: var(--text); outline: none; background: #fafbfc; }
  input[type="text"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(46,117,182,0.15); background: white; }
  .field { margin-bottom: 20px; }
  .timestamp-display { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 15px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  textarea { resize: none; min-height: 70px; font-family: inherit; width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); outline: none; background: #fafbfc; }
  textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(46,117,182,0.15); background: white; }
  .btn { width: 100%; padding: 16px; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .btn-primary { background: linear-gradient(135deg, var(--navy), var(--blue)); }
  .btn-ms { background: #0078d4; }
  .btn-debug { background: #888; font-size: 14px; padding: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .toast { display: none; border-radius: 12px; padding: 16px 20px; font-size: 15px; font-weight: 600; align-items: center; gap: 12px; width: 100%; max-width: 460px; margin-bottom: 12px; }
  .toast.success { display: flex; background: var(--green-light); color: var(--green); border: 1.5px solid #a8d5b5; }
  .toast.error { display: flex; background: var(--red-light); color: var(--red); border: 1.5px solid #f5b7b1; }
  .toast-title { font-size: 15px; font-weight: 700; }
  .toast-sub { font-size: 13px; font-weight: 400; margin-top: 2px; opacity: 0.85; }
  .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }
  #authSection, #formSection { width: 100%; max-width: 460px; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">
    <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
      <rect x="3" y="3" width="7" height="7" rx="1" fill="white"/>
      <rect x="14" y="3" width="7" height="7" rx="1" fill="white"/>
      <rect x="3" y="14" width="7" height="7" rx="1" fill="white"/>
      <rect x="15.5" y="15.5" width="4" height="4" rx="0.5" fill="white"/>
    </svg>
  </div>
  <div>
    <div class="app-title">Warehouse Check-In</div>
    <div class="app-sub" id="headerSub">Tap · Scan · Log</div>
  </div>
</div>

<div class="toast" id="toast">
  <div style="font-size:22px" id="toastIcon"></div>
  <div><div class="toast-title" id="toastTitle"></div><div class="toast-sub" id="toastSub"></div></div>
</div>

<div id="authSection">
  <div class="card" style="text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🔐</div>
    <div style="font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px">Sign in with Microsoft</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6">Sign in once to allow the app to write scan records to your OneDrive Excel file.</div>
    <button class="btn btn-ms" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 23 23" fill="none"><path fill="#f3f3f3" d="M0 0h23v23H0z"/><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>
      Sign in with Microsoft
    </button>
    <div class="hint">Your credentials are never stored by this app.</div>
  </div>
</div>

<div id="formSection">
  <div class="card">
    <div class="location-badge">
      <div style="width:42px;height:42px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="white"/></svg>
      </div>
      <div>
        <div class="loc-name" id="locationName">Loading…</div>
        <div class="loc-id" id="locationId">—</div>
      </div>
    </div>

    <div class="field">
      <label>👤 Your Name</label>
      <input type="text" id="workerName" placeholder="Enter your full name" autocomplete="off">
    </div>
    <div class="field">
      <label>🕐 Scan Time</label>
      <div class="timestamp-display">🕐 <span id="clockDisplay">—</span></div>
    </div>
    <div class="field">
      <label>📝 Notes <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <textarea id="notes" placeholder="Any issues or observations…"></textarea>
    </div>

    <button class="btn btn-primary" id="btnSubmit" onclick="submitScan()">✅ Log Inspection</button>
    <button class="btn btn-debug" onclick="debugDrive()">🔍 Debug: Show OneDrive Root</button>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
const CLIENT_ID     = "9e2c6712-972d-4918-864b-dfd9ed79c74c";
const SHEET_NAME    = "Scan Log";
const SCOPES        = ["Files.ReadWrite", "User.Read"];

let msalInstance = null;
let accessToken  = null;

// ── Init ─────────────────────────────────────────────
async function init() {
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: "https://login.microsoftonline.com/common",
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: { cacheLocation: "localStorage" }
  });
  await msalInstance.initialize();

  try {
    const result = await msalInstance.handleRedirectPromise();
    if (result) { await setupWithAccount(result.account); return; }
  } catch(e) { console.error(e); }

  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    await setupWithAccount(accounts[0]);
  } else {
    document.getElementById("authSection").style.display = "block";
  }
}

async function setupWithAccount(account) {
  try {
    const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
    accessToken = result.accessToken;
  } catch {
    const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    accessToken = result.accessToken;
  }
  document.getElementById("headerSub").textContent = "Signed in as " + (account.name || account.username);
  showForm();
}

function signIn() {
  msalInstance.loginRedirect({ scopes: SCOPES });
}

// ── Form ─────────────────────────────────────────────
function showForm() {
  const p    = new URLSearchParams(window.location.search);
  const locId   = p.get("loc")  || "UNKNOWN";
  const locName = p.get("name") ? decodeURIComponent(p.get("name")) : locId;
  document.getElementById("locationName").textContent = locName;
  document.getElementById("locationId").textContent   = "ID: " + locId;
  document.getElementById("authSection").style.display = "none";
  document.getElementById("formSection").style.display = "block";
  const saved = localStorage.getItem("wh_name");
  if (saved) { document.getElementById("workerName").value = saved; document.getElementById("hint").textContent = "Name saved from your last scan ✓"; }
  setInterval(() => {
    document.getElementById("clockDisplay").textContent =
      new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}) + "  " +
      new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }, 1000);
}

// ── Debug ─────────────────────────────────────────────
async function debugDrive() {
  try {
    const res  = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children?$select=name,id", { headers: { Authorization: "Bearer " + accessToken } });
    const data = await res.json();
    if (data.error) { alert("Error: " + data.error.message); return; }
    const names = data.value.map(f => f.name).join("\n");
    alert("OneDrive root contains:\n\n" + names);
  } catch(e) { alert("Debug failed: " + e.message); }
}

// ── Submit ────────────────────────────────────────────
async function submitScan() {
  const name = document.getElementById("workerName").value.trim();
  if (!name) { showToast("error","Name required","Please enter your name."); return; }

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Saving…';

  try {
    const p       = new URLSearchParams(window.location.search);
    const locId   = p.get("loc")  || "UNKNOWN";
    const locName = p.get("name") ? decodeURIComponent(p.get("name")) : locId;
    const now     = new Date();
    const ts      = now.toISOString().replace("T"," ").substring(0,19);
    const date    = now.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
    const time    = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const notes   = document.getElementById("notes").value.trim();

    // Get file ID first using search
    const fileId = await getFileId("Warehouse_Inspection_Log.xlsx");
    await appendRow(fileId, [ts, date, time, name, locName, locId, notes]);

    localStorage.setItem("wh_name", name);
    document.getElementById("notes").value = "";
    document.getElementById("hint").textContent = "Name saved for next scan ✓";
    showToast("success","Inspection logged!", locName + " · " + time);
  } catch(e) {
    console.error(e);
    showToast("error","Failed to save", e.message);
  }

  btn.disabled = false;
  btn.innerHTML = "✅ Log Inspection";
}

// ── Graph API ─────────────────────────────────────────
async function getFileId(filename) {
  const res  = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/root/search(q='${encodeURIComponent(filename)}')`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const file = data.value && data.value.find(f => f.name === filename);
  if (!file) throw new Error("Could not find " + filename + " in OneDrive. Make sure the file exists and is not in a Teams/SharePoint folder.");
  return file.id;
}

async function appendRow(fileId, rowValues) {
  // Get used range
  const r1  = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(SHEET_NAME)}')/usedRange`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const d1  = await r1.json();
  if (d1.error) throw new Error(d1.error.message);
  const nextRow = (d1.rowCount || 1) + 1;
  const colEnd  = String.fromCharCode(64 + rowValues.length);
  const address = `A${nextRow}:${colEnd}${nextRow}`;

  const r2 = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(SHEET_NAME)}')/range(address='${address}')`,
    {
      method: "PATCH",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ values: [rowValues] })
    }
  );
  const d2 = await r2.json();
  if (d2.error) throw new Error(d2.error.message);
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function showToast(type, title, sub) {
  const t = document.getElementById("toast");
  t.className = "toast " + type;
  document.getElementById("toastIcon").textContent  = type === "success" ? "✅" : "❌";
  document.getElementById("toastTitle").textContent = title;
  document.getElementById("toastSub").textContent   = sub;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "toast", 5000);
}

// ── Start ─────────────────────────────────────────────
window.addEventListener("load", init);
</script>
</body>
</html>
